name: spendsmart
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/categories/
    - assets/income.png
    - assets/expense.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
